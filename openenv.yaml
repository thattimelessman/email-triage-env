name: python-repl-debug-env
version: "1.0.0"
description: >
  A multi-step RL environment where an agent debugs broken Python code
  by iteratively running code, reading errors, and applying fixes until
  all test cases pass. Features 4 difficulty levels, partial credit
  grading, and per-session isolation for concurrent agents.

author: agraj
license: MIT

environment:
  type: http
  framework: fastapi
  entry: main:app
  port: 7860

tasks:
  - id: easy
    description: Fix two simple bugs in sum_evens and is_palindrome functions
    max_steps: 10
  - id: medium
    description: Fix a student grade processor with three interacting bugs
    max_steps: 10
  - id: hard
    description: Fix a priority task scheduler with five interacting bugs
    max_steps: 10
  - id: expert
    description: Fix an LRU Cache implementation with four interacting bugs
    max_steps: 12

actions:
  - name: run_code
    description: Execute current code and observe stdout/stderr
  - name: edit_code
    description: Replace current code with a new version
  - name: submit
    description: Grade current code against all test cases

reward:
  range: [0.02, 0.95]
  partial_credit: true
  description: >
    Scores are strictly between 0 and 1. Remapped from fraction of
    tests passed: 0 tests -> 0.02, all tests -> 0.95, with linear
    interpolation for partial credit.

inference:
  script: inference.py
  model_env: MODEL_NAME
  token_env: HF_TOKEN
  base_url_env: API_BASE_URL
  env_url_env: ENV_URL